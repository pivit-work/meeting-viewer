<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIVIT 문서 뷰어</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa;
    --sidebar-bg: #fff;
    --sidebar-width: 280px;
    --accent: #4f6ef7;
    --accent-light: #eef1fe;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }
  #token-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #token-box {
    background: #fff; border-radius: 12px; padding: 36px 32px; width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  #token-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  #token-box p  { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  #token-box p a { color: var(--accent); }
  #token-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: "SF Mono", Menlo, monospace;
    outline: none; margin-bottom: 12px; color: var(--text);
  }
  #token-input:focus { border-color: var(--accent); }
  #token-save-btn {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #token-save-btn:hover { opacity: 0.9; }
  #token-err { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }

  #sidebar {
    width: var(--sidebar-width); background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  #sidebar-header {
    padding: 20px 16px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  #sidebar-header .logo { font-size: 15px; font-weight: 700; color: var(--accent); }
  #sidebar-header .sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  #token-reset-btn {
    font-size: 11px; color: var(--muted); background: none; border: none;
    cursor: pointer; padding: 2px 0; text-decoration: underline;
  }
  #tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border); padding: 0 8px;
  }
  .tab {
    padding: 8px 2px; text-align: center; font-size: 10px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s; user-select: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 검색 영역 */
  #search-wrap {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  #search-row { display: flex; gap: 6px; }
  #search {
    flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; background: var(--bg); color: var(--text); outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #content-search-btn {
    padding: 7px 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  #content-search-btn:hover { opacity: 0.85; }
  #search-status { font-size: 11px; color: var(--muted); display: none; }

  #file-list { overflow-y: auto; flex: 1; padding: 6px 0; }
  .file-item {
    padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent;
    transition: background 0.1s;
  }
  .file-item:hover { background: var(--bg); }
  .file-item.active { background: var(--accent-light); border-left-color: var(--accent); }
  .file-item .fname {
    font-size: 12px; font-weight: 500; color: var(--text);
    line-height: 1.4; word-break: break-word;
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  }
  .file-item .fdate  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-item .fsnip  {
    font-size: 11px; color: #6b7280; margin-top: 4px;
    line-height: 1.5; word-break: break-word;
    border-left: 2px solid var(--accent); padding-left: 6px;
  }
  .file-item.active .fname { color: var(--accent); }
  .dir-header {
    padding: 10px 16px 3px; font-size: 10px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.4px; user-select: none;
    border-top: 1px solid var(--border); margin-top: 2px;
  }
  .dir-header:first-child { border-top: none; margin-top: 0; }
  .file-item.nested { padding-left: 24px; }
  .badge {
    display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .3px;
    border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
  }
  .badge-ir   { background: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
  .badge-auto { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
  .badge-tt   { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }
  .badge-arch { background: #f3e8ff; color: #6b21a8; border: 1px solid #c084fc; }
  .badge-back { background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; }

  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #toolbar {
    padding: 14px 28px; border-bottom: 1px solid var(--border); background: #fff;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #doc-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  #gh-link {
    font-size: 12px; color: var(--accent); text-decoration: none;
    padding: 5px 10px; border: 1px solid var(--accent); border-radius: 6px;
    display: none; white-space: nowrap;
  }
  #gh-link:hover { background: var(--accent-light); }
  #content { flex: 1; overflow-y: auto; padding: 40px 60px; }
  #md-body { max-width: 780px; margin: 0 auto; }
  #md-body h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
  #md-body h2 { font-size: 18px; font-weight: 700; margin: 32px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  #md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #374151; }
  #md-body p  { font-size: 14px; line-height: 1.75; color: #374151; margin-bottom: 12px; }
  #md-body strong { font-weight: 600; color: var(--text); }
  #md-body ul, #md-body ol { padding-left: 20px; margin-bottom: 12px; }
  #md-body li { font-size: 14px; line-height: 1.7; color: #374151; margin-bottom: 4px; }
  #md-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  #md-body a  { color: var(--accent); text-decoration: none; }
  #md-body a:hover { text-decoration: underline; }
  #md-body code { font-size: 12px; background: #f3f4f6; padding: 2px 5px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; }
  #md-body pre { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  #md-body pre code { background: none; color: inherit; padding: 0; font-size: 13px; }
  #md-body blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 12px 0; color: var(--muted); }
  #md-body table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  #md-body th { background: #f9fafb; font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid var(--border); }
  #md-body td { padding: 8px 12px; border: 1px solid var(--border); line-height: 1.6; }
  #md-body tr:nth-child(even) td { background: #fafafa; }
  #md-body input[type="checkbox"] { margin-right: 6px; }
  #html-frame { width: 100%; height: 100%; border: none; display: none; background: #fff; }
  #empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 10px;
  }
  #empty-state .icon { font-size: 40px; }
  #empty-state .msg  { font-size: 14px; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-size: 14px; gap: 8px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  mark { background: #fef08a; border-radius: 2px; padding: 0 2px; }
  @media (max-width: 640px) { #sidebar { width: 220px; } #content { padding: 24px 20px; } }
</style>
</head>
<body>

<div id="token-overlay" style="display:none">
  <div id="token-box">
    <h2>🔐 GitHub 접근 설정</h2>
    <p>
      문서를 불러오려면 GitHub 읽기 전용 토큰이 필요합니다.<br>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=PIVIT+Viewer" target="_blank">토큰 발급 페이지 →</a>
      (repo 권한 체크 후 생성)
    </p>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxx" />
    <div id="token-err">올바른 토큰을 입력하거나 repo 권한을 확인하세요.</div>
    <button id="token-save-btn" onclick="saveToken()">저장하고 시작하기</button>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <div class="logo">PIVIT 문서 뷰어</div>
      <div class="sub">회의록 · 기획 · 아키텍처 · IR · 자동화 · Tech Talk</div>
    </div>
    <button id="token-reset-btn" onclick="resetToken()">토큰 재설정</button>
  </div>

  <div id="tabs">
    <div class="tab active" data-tab="minutes"    onclick="switchTab('minutes')">회의록</div>
    <div class="tab"        data-tab="planning"   onclick="switchTab('planning')">기획 문서</div>
    <div class="tab"        data-tab="arch"       onclick="switchTab('arch')">아키텍처</div>
    <div class="tab"        data-tab="irdeck"     onclick="switchTab('irdeck')">IR Deck</div>
    <div class="tab"        data-tab="automation" onclick="switchTab('automation')">자동 프로세스</div>
    <div class="tab"        data-tab="techtalk"   onclick="switchTab('techtalk')">Tech Talk</div>
  </div>

  <div id="search-wrap">
    <div id="search-row">
      <input id="search" type="text" placeholder="파일명 검색..." oninput="onSearchInput()" />
      <button id="content-search-btn" onclick="searchContent()" title="회의록 전체 내용에서 결정사항 검색">🔍 전체검색</button>
    </div>
    <div id="search-status"></div>
  </div>

  <div id="file-list">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <div id="doc-title">파일을 선택하세요</div>
    <a id="gh-link" href="#" target="_blank">GitHub에서 보기 ↗</a>
  </div>
  <div id="content">
    <div id="empty-state">
      <div class="icon">📋</div>
      <div class="msg">왼쪽 목록에서 문서를 선택하세요</div>
    </div>
    <div id="md-body" style="display:none"></div>
    <iframe id="html-frame"></iframe>
  </div>
</div>

<script>
const LS_KEY = "pivit_gh_token";

const TAB_SOURCES = {
  minutes:    [{ repo: "pivit-work/team-wiki", folder: "회의록" }],
  planning:   [{ repo: "pivit-work/team-wiki", folder: "기획내용" }],
  arch:       [{ repo: "pivit-work/team-wiki", folder: "아키텍처" }],
  irdeck:     [{ repo: "pivit-work/team-wiki", folder: "ir-deck" }],
  automation: [
    { repo: "pivit-work/team-wiki",                        folder: "" },
    { repo: "pivit-work/pivit-meeting-automation",         folder: "docs" },
  ],
  techtalk:   [{ repo: "pivit-work/team-wiki",             folder: "tech-talk" }],
};

const AUTOMATION_ROOT_FILES = ["automation-alerts.md"];
const AUTOMATION_EXCLUDE    = ["meeting-transcript-2026-03-26.md"];
const ALLOWED_EXT = [".md", ".html", ".jsx"];

let folderCache    = {};
let contentCache   = {};  // path → text (회의록 전체검색용)
let currentTab     = "minutes";
let activeItem     = null;
let ghToken        = "";
let searchResults  = null; // null = 파일명 모드, array = 전체검색 결과 모드

function getToken() { return localStorage.getItem(LS_KEY) || ""; }

function saveToken() {
  const val = document.getElementById("token-input").value.trim();
  if (!val.startsWith("ghp_") && !val.startsWith("github_pat_")) {
    document.getElementById("token-err").style.display = "block";
    return;
  }
  localStorage.setItem(LS_KEY, val);
  ghToken = val;
  document.getElementById("token-overlay").style.display = "none";
  loadFileList();
}

function resetToken() {
  localStorage.removeItem(LS_KEY);
  document.getElementById("token-input").value = "";
  document.getElementById("token-err").style.display = "none";
  document.getElementById("token-overlay").style.display = "flex";
}

async function ghGet(repo, path) {
  const encodedPath = path ? path.split('/').map(s => encodeURIComponent(s)).join('/') : '';
  const url = `https://api.github.com/repos/${repo}/contents/${encodedPath}`;
  const r = await fetch(url, {
    headers: { Authorization: `token ${ghToken}`, Accept: "application/vnd.github+json" },
  });
  if (r.status === 401) { resetToken(); throw new Error("인증 실패"); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchText(repo, path) {
  const data  = await ghGet(repo, path);
  const bytes = Uint8Array.from(atob(data.content.replace(/\n/g, "")), c => c.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}

async function fetchFilesRecursive(repo, dirPath, baseFolder, maxDepth = 3, depth = 0) {
  const items = await ghGet(repo, dirPath);
  if (!Array.isArray(items)) return [];
  const results = [];
  for (const item of items) {
    const ext = "." + item.name.split('.').pop();
    if (item.type === 'file' && ALLOWED_EXT.includes(ext)) {
      const relPath = baseFolder ? item.path.slice(baseFolder.length + 1) : item.path;
      const parts   = relPath.split('/');
      item._subdir  = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
      results.push(item);
    } else if (item.type === 'dir' && depth < maxDepth) {
      const sub = await fetchFilesRecursive(repo, item.path, baseFolder, maxDepth, depth + 1);
      results.push(...sub);
    }
  }
  return results;
}

function parseDate(name) {
  const m = name.match(/(\d{8})/);
  return m ? m[1] : "00000000";
}

function categorize(name) {
  if (/^pivit_feature_/.test(name) || /earnest/i.test(name)) return "planning";
  return "minutes";
}

const AUTO_LABELS = {
  "implementation-status":             "구현 현황",
  "meeting-notes-automation-pipeline": "회의록 자동화 파이프라인 설계",
  "project-handoff":                   "프로젝트 핸드오프",
  "automation-alerts":                 "자동화 & 얼럿 전체 목록",
};

function autoLabel(name) {
  const key = name.replace(/\.(md|html|jsx)$/, "");
  return AUTO_LABELS[key] || key;
}

function fileLabel(f, folder) {
  if (folder === "docs" || folder === "" || folder === "tech-talk")
    return autoLabel(f.name);
  return f.name.replace(/\.(md|html|jsx)$/, "");
}

async function loadFileList() {
  const sources  = TAB_SOURCES[currentTab];
  const cacheKey = currentTab;
  if (folderCache[cacheKey]) { renderList(); return; }

  document.getElementById("file-list").innerHTML =
    `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;

  try {
    const allMapped = [];
    for (const { repo, folder } of sources) {
      const isAutoRepo   = repo.includes("meeting-automation");
      const isRootFolder = folder === "";

      const rawFiles = isRootFolder
        ? await ghGet(repo, folder)
        : await fetchFilesRecursive(repo, folder, folder);

      const filtered = rawFiles.filter(f => {
        const ext = "." + f.name.split('.').pop();
        if (!ALLOWED_EXT.includes(ext)) return false;
        if (AUTOMATION_EXCLUDE.includes(f.name)) return false;
        if (isRootFolder) return AUTOMATION_ROOT_FILES.includes(f.name);
        return true;
      });

      const mapped = filtered.map(f => ({
        name:     f.name,
        path:     f.path,
        repo:     repo,
        htmlUrl:  f.html_url,
        date:     parseDate(f.name),
        subdir:   f._subdir || '',
        category: (() => {
          if (folder === "아키텍처")  return "arch";
          if (folder === "ir-deck")  return "irdeck";
          if (folder === "tech-talk") return "techtalk";
          if (folder === "기획내용")  return "planning";
          if (folder === "docs" || isRootFolder || isAutoRepo) return "automation";
          return categorize(f.name);
        })(),
        label:  fileLabel(f, folder),
        isHtml: f.name.endsWith('.html'),
        isJsx:  f.name.endsWith('.jsx'),
      }));
      allMapped.push(...mapped);
    }

    allMapped.sort((a, b) => b.date.localeCompare(a.date));
    folderCache[cacheKey] = allMapped;
    renderList();
  } catch (e) {
    document.getElementById("file-list").innerHTML =
      `<div style="padding:16px;font-size:12px;color:#ef4444">불러오기 실패: ${e.message}</div>`;
  }
}

// ── 전체 내용 검색 (회의록 탭)
async function searchContent() {
  const q = document.getElementById("search").value.trim();
  if (!q) { searchResults = null; renderList(); return; }

  const status = document.getElementById("search-status");
  status.style.display = "block";
  status.textContent = "전체 검색 중...";

  const cached = folderCache[currentTab] || [];
  const minutes = cached.filter(f => f.category === currentTab);

  const results = [];
  let done = 0;
  for (const f of minutes) {
    try {
      let text = contentCache[f.path];
      if (!text) {
        text = await fetchText(f.repo, f.path);
        contentCache[f.path] = text;
      }
      const lower = text.toLowerCase();
      const qLow  = q.toLowerCase();
      const idx   = lower.indexOf(qLow);
      if (idx !== -1) {
        const snip = text.slice(Math.max(0, idx - 60), idx + 120)
          .replace(/\n/g, " ").replace(/#+\s*/g, "").trim();
        const highlighted = snip.replace(
          new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
          m => `<mark>${m}</mark>`
        );
        results.push({ ...f, snippet: highlighted });
      }
    } catch (_) {}
    done++;
    status.textContent = `전체 검색 중... (${done}/${minutes.length})`;
  }

  searchResults = results;
  status.textContent = `"${q}" 검색 결과: ${results.length}개 파일`;
  renderList();
}

function onSearchInput() {
  if (searchResults !== null) {
    // 전체검색 모드 해제
    searchResults = null;
    document.getElementById("search-status").style.display = "none";
  }
  renderList();
}

function fmtDate(d) {
  if (!d || d === "00000000") return "";
  return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
}

function renderList() {
  const q      = document.getElementById("search").value.toLowerCase();
  const list   = document.getElementById("file-list");
  const cached = folderCache[currentTab] || [];

  // 전체검색 결과 모드
  if (searchResults !== null) {
    if (searchResults.length === 0) {
      list.innerHTML = `<div style="padding:20px 16px;font-size:12px;color:#9ca3af;text-align:center">검색 결과 없음</div>`;
      return;
    }
    let html = '';
    for (const f of searchResults) {
      const isActive = activeItem === f.path;
      const esc  = f.label.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const escR = f.repo.replace(/'/g, "\\'");
      html += `
        <div class="file-item ${isActive ? "active" : ""}"
             onclick="openFile('${f.path}','${esc}','${f.htmlUrl}','${escR}','${f.isHtml||false}')">
          <div class="fname">${f.label}</div>
          <div class="fdate">${fmtDate(f.date)}</div>
          <div class="fsnip">${f.snippet}</div>
        </div>`;
    }
    list.innerHTML = html;
    return;
  }

  // 파일명 검색 모드
  const items = cached.filter(f =>
    f.category === currentTab &&
    (q === "" || f.label.toLowerCase().includes(q) || f.subdir.toLowerCase().includes(q))
  );

  if (items.length === 0) {
    list.innerHTML = `<div style="padding:20px 16px;font-size:12px;color:#9ca3af;text-align:center">문서가 없습니다</div>`;
    return;
  }

  const groups = new Map();
  for (const f of items) {
    const key = f.subdir || '';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(f);
  }

  const sortedKeys = [...groups.keys()].sort((a, b) => {
    if (a === '' && b !== '') return -1;
    if (a !== '' && b === '') return 1;
    return a.localeCompare(b, 'ko');
  });

  let html = '';
  for (const key of sortedKeys) {
    const groupItems = groups.get(key);
    groupItems.sort((a, b) => b.date.localeCompare(a.date));
    if (key) html += `<div class="dir-header">📁 ${key}</div>`;
    for (const f of groupItems) {
      const isActive = activeItem === f.path;
      const esc  = f.label.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const escR = f.repo.replace(/'/g, "\\'");
      let badge = "";
      if (currentTab === "irdeck")     badge = `<span class="badge badge-ir">IR</span>`;
      if (currentTab === "automation") badge = `<span class="badge badge-auto">AUTO</span>`;
      if (currentTab === "techtalk")   badge = f.isHtml ? `<span class="badge badge-tt">SLIDES</span>` : `<span class="badge badge-tt">TT</span>`;
      if (currentTab === "arch")       badge = f.isJsx ? `<span class="badge badge-arch">JSX</span>` : (f.isHtml ? `<span class="badge badge-arch">HTML</span>` : `<span class="badge badge-arch">ARCH</span>`);
      if (f.name.includes("backlog"))  badge = `<span class="badge badge-back">BACKLOG</span>`;
      html += `
        <div class="file-item ${isActive ? "active" : ""} ${key ? "nested" : ""}"
             onclick="openFile('${f.path}','${esc}','${f.htmlUrl}','${escR}','${f.isHtml||false}','${f.isJsx||false}')">
          <div class="fname">${f.label} ${badge}</div>
          <div class="fdate">${fmtDate(f.date)}</div>
        </div>`;
    }
  }
  list.innerHTML = html;
}

async function openFile(path, label, htmlUrl, repo, isHtml, isJsx) {
  activeItem = path;
  renderList();

  document.getElementById("doc-title").textContent = label;
  const lnk = document.getElementById("gh-link");
  lnk.href = htmlUrl; lnk.style.display = "inline-block";

  const mdBody  = document.getElementById("md-body");
  const frame   = document.getElementById("html-frame");
  const empty   = document.getElementById("empty-state");
  const content = document.getElementById("content");
  empty.style.display = "none";

  if (isHtml === "true") {
    mdBody.style.display = "block";
    mdBody.innerHTML = `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;
    frame.style.display = "none"; frame.srcdoc = "";
    try {
      const data      = await ghGet(repo, path);
      const bytes     = Uint8Array.from(atob(data.content.replace(/\n/g,"")), c=>c.charCodeAt(0));
      const htmlContent = new TextDecoder("utf-8").decode(bytes);
      mdBody.style.display = "none";
      frame.srcdoc = htmlContent; frame.style.display = "block";
      content.style.padding = "0"; content.style.overflow = "hidden";
    } catch (e) {
      mdBody.style.display = "block";
      mdBody.innerHTML = `<p style="color:#ef4444">로드 실패: ${e.message}</p>`;
    }
  } else {
    frame.style.display = "none"; frame.srcdoc = "";
    content.style.padding = ""; content.style.overflow = "";
    mdBody.style.display = "block";
    mdBody.innerHTML = `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;
    try {
      const text = contentCache[path] || await fetchText(repo, path);
      contentCache[path] = text;
      if (isJsx === "true") {
        // JSX → 코드 블록으로 렌더링
        const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        mdBody.innerHTML = `<pre><code>${escaped}</code></pre>`;
      } else {
        mdBody.innerHTML = marked.parse(text);
      }
      content.scrollTop = 0;
    } catch (e) {
      mdBody.innerHTML = `<p style="color:#ef4444">파일 로드 실패: ${e.message}</p>`;
    }
  }
}

function switchTab(tab) {
  currentTab = tab;
  searchResults = null;
  document.getElementById("search-status").style.display = "none";
  document.getElementById("search").value = "";
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.dataset.tab === tab));
  // 아키텍처 탭에서는 전체검색 버튼 숨김
  document.getElementById("content-search-btn").style.display =
    (tab === "minutes") ? "inline-block" : "none";
  activeItem = null;
  document.getElementById("doc-title").textContent = "파일을 선택하세요";
  document.getElementById("gh-link").style.display = "none";
  document.getElementById("md-body").style.display = "none";
  const fr = document.getElementById("html-frame"); fr.style.display="none"; fr.srcdoc="";
  document.getElementById("content").style.padding = "";
  document.getElementById("content").style.overflow = "";
  document.getElementById("empty-state").style.display = "flex";
  loadFileList();
}

ghToken = getToken();
if (!ghToken) {
  document.getElementById("token-overlay").style.display = "flex";
  document.getElementById("file-list").innerHTML = "";
} else {
  // 초기 탭 세팅: 아키텍처 탭에서는 전체검색 버튼 숨김
  document.getElementById("content-search-btn").style.display = "inline-block";
  loadFileList();
}
</script>
