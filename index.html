<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIVIT 회의록 뷰어</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa;
    --sidebar-bg: #fff;
    --sidebar-width: 280px;
    --accent: #4f6ef7;
    --accent-light: #eef1fe;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 토큰 설정 오버레이 */
  #token-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  #token-box {
    background: #fff;
    border-radius: 12px;
    padding: 36px 32px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  #token-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  #token-box p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  #token-box p a { color: var(--accent); }

  #token-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: "SF Mono", Menlo, monospace;
    outline: none;
    margin-bottom: 12px;
    color: var(--text);
  }

  #token-input:focus { border-color: var(--accent); }

  #token-save-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #token-save-btn:hover { opacity: 0.9; }
  #token-err { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }

  /* ── 사이드바 */
  #sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  #sidebar-header .logo { font-size: 15px; font-weight: 700; color: var(--accent); }
  #sidebar-header .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  #token-reset-btn {
    font-size: 11px; color: var(--muted); background: none; border: none;
    cursor: pointer; padding: 2px 0; text-decoration: underline;
  }

  #tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
  }

  .tab {
    flex: 1; padding: 10px 4px;
    text-align: center; font-size: 12px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s; user-select: none;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  #search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }

  #search {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; background: var(--bg); color: var(--text); outline: none;
  }

  #search:focus { border-color: var(--accent); }

  #file-list { overflow-y: auto; flex: 1; padding: 6px 0; }

  .file-item {
    padding: 9px 16px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
  }

  .file-item:hover { background: var(--bg); }

  .file-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
  }

  .file-item .fname {
    font-size: 12px; font-weight: 500; color: var(--text);
    line-height: 1.4; word-break: break-word;
  }

  .file-item .fdate { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-item.active .fname { color: var(--accent); }

  /* IR Deck 뱃지 */
  .badge-ir {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    background: #fef3c7; color: #92400e;
    border: 1px solid #fbbf24;
    border-radius: 4px; padding: 1px 5px;
    margin-left: 6px; vertical-align: middle;
    letter-spacing: .3px;
  }

  /* ── 메인 */
  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  #toolbar {
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }

  #doc-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }

  #gh-link {
    font-size: 12px; color: var(--accent); text-decoration: none;
    padding: 5px 10px; border: 1px solid var(--accent); border-radius: 6px;
    display: none; white-space: nowrap;
  }

  #gh-link:hover { background: var(--accent-light); }

  #content { flex: 1; overflow-y: auto; padding: 40px 60px; }

  #md-body { max-width: 780px; margin: 0 auto; }
  #md-body h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
  #md-body h2 { font-size: 18px; font-weight: 700; margin: 32px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  #md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #374151; }
  #md-body p { font-size: 14px; line-height: 1.75; color: #374151; margin-bottom: 12px; }
  #md-body strong { font-weight: 600; color: var(--text); }
  #md-body ul, #md-body ol { padding-left: 20px; margin-bottom: 12px; }
  #md-body li { font-size: 14px; line-height: 1.7; color: #374151; margin-bottom: 4px; }
  #md-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  #md-body a { color: var(--accent); text-decoration: none; }
  #md-body a:hover { text-decoration: underline; }
  #md-body code { font-size: 12px; background: #f3f4f6; padding: 2px 5px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; }
  #md-body pre { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  #md-body pre code { background: none; color: inherit; padding: 0; font-size: 13px; }
  #md-body blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 12px 0; color: var(--muted); }
  #md-body table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  #md-body th { background: #f9fafb; font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid var(--border); }
  #md-body td { padding: 8px 12px; border: 1px solid var(--border); line-height: 1.6; }
  #md-body tr:nth-child(even) td { background: #fafafa; }

  #empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 10px;
  }

  #empty-state .icon { font-size: 40px; }
  #empty-state .msg { font-size: 14px; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-size: 14px; gap: 8px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    #sidebar { width: 220px; }
    #content { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- 토큰 입력 오버레이 -->
<div id="token-overlay" style="display:none">
  <div id="token-box">
    <h2>🔐 GitHub 접근 설정</h2>
    <p>
      회의록을 불러오려면 GitHub 읽기 전용 토큰이 필요합니다.<br>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=PIVIT+Viewer" target="_blank">토큰 발급 페이지 →</a>
      (repo 권한 체크 후 생성)
    </p>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxx" />
    <div id="token-err">올바른 토큰을 입력하거나 repo 권한을 확인하세요.</div>
    <button id="token-save-btn" onclick="saveToken()">저장하고 시작하기</button>
  </div>
</div>

<!-- 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <div class="logo">PIVIT 문서 뷰어</div>
      <div class="sub">회의록 · 기획 문서 · IR</div>
    </div>
    <button id="token-reset-btn" onclick="resetToken()" title="토큰 재설정">토큰 재설정</button>
  </div>

  <div id="tabs">
    <div class="tab active" data-tab="minutes" onclick="switchTab('minutes')">회의록</div>
    <div class="tab" data-tab="planning" onclick="switchTab('planning')">기획 문서</div>
    <div class="tab" data-tab="irdeck" onclick="switchTab('irdeck')">IR Deck</div>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="파일 검색..." oninput="renderList()" />
  </div>

  <div id="file-list">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="toolbar">
    <div id="doc-title">파일을 선택하세요</div>
    <a id="gh-link" href="#" target="_blank">GitHub에서 보기 ↗</a>
  </div>
  <div id="content">
    <div id="empty-state">
      <div class="icon">📋</div>
      <div class="msg">왼쪽 목록에서 문서를 선택하세요</div>
    </div>
    <div id="md-body" style="display:none"></div>
  </div>
</div>

<script>
const REPO   = "pivit-work/team-wiki";
const LS_KEY = "pivit_gh_token";

// 탭별 폴더 매핑
const TAB_FOLDERS = {
  minutes:  "회의록",
  planning: "회의록",
  irdeck:   "ir-deck",
};

// 폴더별 파일 캐시 (같은 폴더는 한 번만 로드)
let folderCache = {};
let currentTab  = "minutes";
let activeItem  = null;
let ghToken     = "";

// ── 토큰 관리
function getToken() { return localStorage.getItem(LS_KEY) || ""; }

function saveToken() {
  const val = document.getElementById("token-input").value.trim();
  if (!val.startsWith("ghp_") && !val.startsWith("github_pat_")) {
    document.getElementById("token-err").style.display = "block";
    return;
  }
  localStorage.setItem(LS_KEY, val);
  ghToken = val;
  document.getElementById("token-overlay").style.display = "none";
  loadFileList();
}

function resetToken() {
  localStorage.removeItem(LS_KEY);
  document.getElementById("token-input").value = "";
  document.getElementById("token-err").style.display = "none";
  document.getElementById("token-overlay").style.display = "flex";
}

// ── GitHub API
async function ghGet(path) {
  const url = `https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(path)}`;
  const r = await fetch(url, {
    headers: { Authorization: `token ${ghToken}`, Accept: "application/vnd.github+json" },
  });
  if (r.status === 401) { resetToken(); throw new Error("인증 실패"); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchText(path) {
  const data = await ghGet(path);
  const bytes = Uint8Array.from(atob(data.content.replace(/\n/g, "")), c => c.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}

// ── 파일 분류
function parseDate(name) {
  const m = name.match(/(\d{8})/);
  return m ? m[1] : "00000000";
}

function categorize(name) {
  if (/^pivit_feature_/.test(name) || /earnest/i.test(name) || /feedback.*평가/i.test(name)) return "planning";
  return "minutes";
}

// ── 파일 목록 로드
async function loadFileList() {
  const folder = TAB_FOLDERS[currentTab];

  // 이미 캐시된 폴더면 렌더만
  if (folderCache[folder]) {
    renderList();
    return;
  }

  document.getElementById("file-list").innerHTML =
    `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;

  try {
    const files = await ghGet(folder);
    const mapped = files
      .filter(f => f.name.endsWith(".md"))
      .map(f => ({
        name:     f.name,
        path:     f.path,
        htmlUrl:  f.html_url,
        date:     parseDate(f.name),
        category: folder === "ir-deck" ? "irdeck" : categorize(f.name),
        label:    f.name.replace(/\.md$/, ""),
      }))
      .sort((a, b) => b.date.localeCompare(a.date));

    folderCache[folder] = mapped;
    renderList();
  } catch (e) {
    document.getElementById("file-list").innerHTML =
      `<div style="padding:16px;font-size:12px;color:#ef4444">불러오기 실패: ${e.message}</div>`;
  }
}

// ── 목록 렌더링
function fmtDate(d) {
  if (!d || d === "00000000") return "";
  return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
}

function renderList() {
  const q      = document.getElementById("search").value.toLowerCase();
  const list   = document.getElementById("file-list");
  const folder = TAB_FOLDERS[currentTab];
  const cached = folderCache[folder] || [];

  const items = cached.filter(f =>
    f.category === currentTab &&
    (q === "" || f.label.toLowerCase().includes(q))
  );

  if (items.length === 0) {
    list.innerHTML = `<div style="padding:20px 16px;font-size:12px;color:#9ca3af;text-align:center">문서가 없습니다</div>`;
    return;
  }

  list.innerHTML = items.map(f => {
    const isActive = activeItem === f.path;
    const esc = f.label.replace(/'/g, "\\'").replace(/"/g, "&quot;");
    const irBadge = currentTab === 'irdeck' ? '<span class="badge-ir">IR</span>' : '';
    return `
      <div class="file-item ${isActive ? "active" : ""}"
           onclick="openFile('${f.path}','${esc}','${f.htmlUrl}')">
        <div class="fname">${f.label}${irBadge}</div>
        <div class="fdate">${fmtDate(f.date)}</div>
      </div>`;
  }).join("");
}

// ── 파일 열기
async function openFile(path, label, htmlUrl) {
  activeItem = path;
  renderList();

  document.getElementById("doc-title").textContent = label;
  const lnk = document.getElementById("gh-link");
  lnk.href = htmlUrl;
  lnk.style.display = "inline-block";

  const mdBody = document.getElementById("md-body");
  document.getElementById("empty-state").style.display = "none";
  mdBody.style.display = "block";
  mdBody.innerHTML = `<div class="loading"><div class="spinner"></div> 불러오는 중...</div>`;

  try {
    const text = await fetchText(path);
    mdBody.innerHTML = marked.parse(text);
    document.getElementById("content").scrollTop = 0;
  } catch (e) {
    mdBody.innerHTML = `<p style="color:#ef4444">파일 로드 실패: ${e.message}</p>`;
  }
}

// ── 탭 전환
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(el => {
    el.classList.toggle("active", el.dataset.tab === tab);
  });
  activeItem = null;
  document.getElementById("doc-title").textContent = "파일을 선택하세요";
  document.getElementById("gh-link").style.display = "none";
  document.getElementById("md-body").style.display = "none";
  document.getElementById("empty-state").style.display = "flex";
  loadFileList();
}

// ── 시작
ghToken = getToken();
if (!ghToken) {
  document.getElementById("token-overlay").style.display = "flex";
  document.getElementById("file-list").innerHTML = "";
} else {
  loadFileList();
}
</script>

</body>
</html>
